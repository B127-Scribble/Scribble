<!DOCTYPE html>
<html>
<head>
    <title>Scribble Sheets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0d0f;
            color: #e8e8f0;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #6c63ff;
            margin-bottom: 8px;
        }
        p.subtitle {
            font-size: 14px;
            color: #6b6b80;
            margin-bottom: 40px;
        }
        button {
            background-color: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover {
            background-color: #5a52d5;
        }
        #sheets-container {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        #empty-message {
            color: #6b6b80;
            font-size: 14px;
            margin-top: 10px;
        }
        .sheet-card {
            background-color: #1a1a1f;
            border: 1px solid #2a2a35;
            border-radius: 10px;
            padding: 20px;
            width: 160px;
            height: 100px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .sheet-card:hover {
            border-color: #6c63ff;
            background-color: #1e1e28;
        }
        .card-name {
            font-size: 14px;
            color: #e8e8f0;
            text-align: center;
            margin-bottom: 8px;
        }
        .card-delete-btn {
            background-color: transparent;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }
        .card-delete-btn:hover {
            background-color: #f87171;
        }
    </style>
</head>
<body>
    <h1>Scribble Sheets</h1>
    <p class="subtitle">Your spreadsheets, saved to the cloud</p>
    <button id="new-sheet-btn">+ New Sheet</button>
    <div id="sheets-container">
        <p id="empty-message">No sheets yet. Click + New Sheet to create one!</p>
    </div>

    <script>
        let allSheets = [];

        const newSheetBtn = document.getElementById('new-sheet-btn');
        const sheetsContainer = document.getElementById('sheets-container');
        const emptyMessage = document.getElementById('empty-message');

        function saveSheet(sheet) {
            allSheets.push(sheet);
            console.log('SAVE:' + JSON.stringify(allSheets));
        }

        function deleteSheet(id) {
            allSheets = allSheets.filter(function(sheet) {
                return sheet.id !== id;
            });
            console.log('SAVE:' + JSON.stringify(allSheets));
        }

        function renameSheet(id, newName) {
            allSheets.forEach(function(sheet) {
                if (sheet.id === id) {
                    sheet.title = newName;
                }
            });
            console.log('SAVE:' + JSON.stringify(allSheets));
        }

        function loadSheets(sheets) {
            if (!sheets || sheets.length === 0) return;
            allSheets = sheets;
            sheets.forEach(function(sheet) {
                createSheetCard(sheet.title, sheet.id);
            });
        }

        newSheetBtn.addEventListener('click', function() {
            const name = prompt("Name your sheet:");
            if (!name) return;

            const sheet = {
                id: Date.now().toString(),
                title: name,
                data: {}
            };

            saveSheet(sheet);
            createSheetCard(sheet.title, sheet.id);
        });

        function createSheetCard(name, id) {
            emptyMessage.style.display = 'none';

            const card = document.createElement('div');
            card.className = 'sheet-card';
            card.dataset.id = id;

            card.addEventListener('click', function() {
                window.location.href = 'sheets_editor.html?id=' + id + '&name=' + encodeURIComponent(name);
            });

            card.addEventListener('dblclick', function() {
                const newName = prompt("Rename sheet:", cardName.textContent);
                if (!newName) return;
                cardName.textContent = newName;
                renameSheet(id, newName);
            });

            const cardName = document.createElement('p');
            cardName.textContent = name;
            cardName.className = 'card-name';

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '🗑';
            deleteBtn.className = 'card-delete-btn';

            deleteBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (confirm("Delete " + name + "?")) {
                    card.remove();
                    deleteSheet(id);
                    if (sheetsContainer.querySelectorAll('.sheet-card').length === 0) {
                        emptyMessage.style.display = 'block';
                    }
                }
            });

            card.appendChild(cardName);
            card.appendChild(deleteBtn);
            sheetsContainer.appendChild(card);
        }
    </script>
</body>
</html>
