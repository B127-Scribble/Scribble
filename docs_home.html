<!DOCTYPE html>
<html>
<head>
    <title>Scribble Docs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0d0f;
            color: #e8e8f0;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #6c63ff;
            margin-bottom: 8px;
        }
        p.subtitle {
            font-size: 14px;
            color: #6b6b80;
            margin-bottom: 40px;
        }
        button {
            background-color: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover {
            background-color: #5a52d5;
        }
        #docs-container {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        #empty-message {
            color: #6b6b80;
            font-size: 14px;
            margin-top: 10px;
        }
        .doc-card {
            background-color: #1a1a1f;
            border: 1px solid #2a2a35;
            border-radius: 10px;
            padding: 20px;
            width: 160px;
            height: 100px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .doc-card:hover {
            border-color: #6c63ff;
            background-color: #1e1e28;
        }
        .card-name {
            font-size: 14px;
            color: #e8e8f0;
            text-align: center;
            margin-bottom: 8px;
        }
        .card-delete-btn {
            background-color: transparent;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }
        .card-delete-btn:hover {
            background-color: #f87171;
        }
    </style>
</head>
<body>
    <h1>Scribble Docs</h1>
    <p class="subtitle">Your documents, saved to localy</p>
    <button id="new-doc-btn">+ New Document</button>
    <div id="docs-container">
        <p id="empty-message">No documents yet. Click + New Document to create one!</p>
    </div>

    <script>
        let allDocs = [];

        const newDocBtn = document.getElementById('new-doc-btn');
        const docsContainer = document.getElementById('docs-container');
        const emptyMessage = document.getElementById('empty-message');

        function loadDocs(docs) {
            if (!docs || docs.length === 0) return;
            allDocs = docs;
            docs.forEach(function(doc) {
                createDocCard(doc.title, doc.id);
            });
        }

        newDocBtn.addEventListener('click', function() {
            const name = prompt("Name your document:");
            if (!name) return;

            const doc = {
                id: Date.now().toString(),
                title: name,
                content: ''
            };

            allDocs.push(doc);
            console.log('SAVEDOC:' + JSON.stringify(allDocs));
            createDocCard(doc.title, doc.id);
        });

        function createDocCard(name, id) {
            emptyMessage.style.display = 'none';

            const card = document.createElement('div');
            card.className = 'doc-card';
            card.dataset.id = id;

            card.addEventListener('click', function() {
                window.location.href = 'docs_editor.html?id=' + id + '&name=' + encodeURIComponent(name);
            });

            card.addEventListener('dblclick', function() {
                const newName = prompt("Rename document:", cardName.textContent);
                if (!newName) return;
                cardName.textContent = newName;
                allDocs.forEach(function(doc) {
                    if (doc.id === id) doc.title = newName;
                });
                console.log('SAVEDOC:' + JSON.stringify(allDocs));
            });

            const cardName = document.createElement('p');
            cardName.textContent = name;
            cardName.className = 'card-name';

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '🗑';
            deleteBtn.className = 'card-delete-btn';

            deleteBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (confirm("Delete " + name + "?")) {
                    card.remove();
                    allDocs = allDocs.filter(function(doc) {
                        return doc.id !== id;
                    });
                    console.log('SAVEDOC:' + JSON.stringify(allDocs));
                    if (docsContainer.querySelectorAll('.doc-card').length === 0) {
                        emptyMessage.style.display = 'block';
                    }
                }
            });

            card.appendChild(cardName);
            card.appendChild(deleteBtn);
            docsContainer.appendChild(card);
        }
    </script>
</body>
</html>
