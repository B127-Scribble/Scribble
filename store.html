<!DOCTYPE html>
<html>
<head>
    <title>Scribble Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0d0d0f;
            color: #e8e8f0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #top-bar {
            background-color: #1a1a1f;
            border-bottom: 1px solid #2a2a35;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #title {
            color: #6c63ff;
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
        }
        #search-input {
            flex: 1;
            background-color: #1e1e28;
            color: #e8e8f0;
            border: 1.5px solid #2a2a35;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            outline: none;
        }
        #search-input:focus { border-color: #6c63ff; }
        #search-btn {
            background-color: #6c63ff;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 14px;
            cursor: pointer;
        }
        #search-btn:hover { background-color: #5a52d5; }
        #tabs {
            display: flex;
            background-color: #111115;
            border-bottom: 1px solid #2a2a35;
        }
        .tab {
            padding: 10px 24px;
            font-size: 13px;
            color: #6b6b80;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #e8e8f0;
            border-bottom: 2px solid #6c63ff;
        }
        .tab:hover:not(.active) { color: #aaaacc; }
        #content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .app-card {
            background-color: #1a1a1f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .app-card:hover { border-color: #3a3a55; }
        .app-icon {
            font-size: 32px;
            width: 48px;
            text-align: center;
        }
        .app-info { flex: 1; }
        .app-name {
            font-size: 15px;
            font-weight: 600;
            color: #e8e8f0;
            margin-bottom: 4px;
        }
        .app-id {
            font-size: 11px;
            color: #3a3a55;
            margin-bottom: 4px;
        }
        .app-desc {
            font-size: 12px;
            color: #6b6b80;
        }
        .app-version {
            font-size: 11px;
            color: #3a3a55;
            margin-right: 12px;
        }
        .install-btn {
            background-color: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .install-btn:hover { background-color: #5a52d5; }
        .install-btn.installed {
            background-color: #1e1e28;
            color: #6b6b80;
            border: 1px solid #2a2a35;
            cursor: default;
        }
        .open-btn {
            background-color: #1e1e28;
            color: #a78bfa;
            border: 1px solid #2a2a35;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            margin-right: 6px;
        }
        .open-btn:hover { background-color: #2a2a35; }
        .uninstall-btn {
            background-color: transparent;
            color: #f87171;
            border: 1px solid #f87171;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .uninstall-btn:hover { background-color: #f87171; color: white; }
        #status-bar {
            background-color: #111115;
            border-top: 1px solid #2a2a35;
            padding: 6px 16px;
            font-size: 12px;
            color: #6b6b80;
        }
        #empty-msg {
            text-align: center;
            color: #3a3a55;
            font-size: 14px;
            margin-top: 60px;
        }
        .installing {
            color: #a78bfa;
            font-size: 13px;
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <span id="title">🏪 Scribble Store</span>
        <input type="text" id="search-input" placeholder="Search for any app...">
        <button id="search-btn">Search</button>
    </div>

    <div id="tabs">
        <div class="tab active" onclick="switchTab('browse')">Browse</div>
        <div class="tab" onclick="switchTab('myapps')">My Apps</div>
    </div>

    <div id="content">
        <div id="empty-msg">Search for an app to get started</div>
    </div>

    <div id="status-bar" id="status">Ready</div>

    <script>
        let currentTab = 'browse';
        let installedApps = [];
        let searchResults = [];

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(function(t, i) {
                t.classList.toggle('active', (i === 0 && tab === 'browse') || (i === 1 && tab === 'myapps'));
            });
            if (tab === 'browse') {
                renderResults(searchResults);
            } else {
                renderMyApps();
            }
        }

        function getIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('chrome') || n.includes('firefox') || n.includes('browser')) return '🌐';
            if (n.includes('code') || n.includes('visual') || n.includes('editor')) return '💻';
            if (n.includes('game') || n.includes('steam')) return '🎮';
            if (n.includes('python')) return '🐍';
            if (n.includes('node')) return '📦';
            if (n.includes('git')) return '🔧';
            if (n.includes('vlc') || n.includes('media') || n.includes('player')) return '🎵';
            if (n.includes('photo') || n.includes('image') || n.includes('paint')) return '🖼';
            if (n.includes('zoom') || n.includes('teams') || n.includes('discord')) return '💬';
            return '⚙️';
        }

        function renderResults(results) {
            const content = document.getElementById('content');
            content.innerHTML = '';

            if (results.length === 0) {
                content.innerHTML = '<div id="empty-msg">Search for an app to get started</div>';
                return;
            }

            results.forEach(function(app) {
                const isInstalled = installedApps.find(function(a) { return a.id === app.id; });
                const card = document.createElement('div');
                card.className = 'app-card';

                const icon = document.createElement('div');
                icon.className = 'app-icon';
                icon.textContent = getIcon(app.name);

                const info = document.createElement('div');
                info.className = 'app-info';
                info.innerHTML = `
                    <div class="app-name">${app.name}</div>
                    <div class="app-id">${app.id}</div>
                    <div class="app-desc">${app.desc || ''}</div>
                `;

                const version = document.createElement('span');
                version.className = 'app-version';
                version.textContent = app.version || '';

                const btn = document.createElement('button');
                btn.className = isInstalled ? 'install-btn installed' : 'install-btn';
                btn.textContent = isInstalled ? '✓ Installed' : 'Install';
                if (!isInstalled) {
                    btn.addEventListener('click', function() {
                        installApp(app);
                    });
                }

                card.appendChild(icon);
                card.appendChild(info);
                card.appendChild(version);
                card.appendChild(btn);
                content.appendChild(card);            });
            }

        function renderMyApps() {
            const content = document.getElementById('content');
            content.innerHTML = '';

            if (installedApps.length === 0) {
                content.innerHTML = '<div id="empty-msg">No apps installed yet</div>';
                return;
            }

            installedApps.forEach(function(app) {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.innerHTML = `
                    <div class="app-icon">${getIcon(app.name)}</div>
                    <div class="app-info">
                        <div class="app-name">${app.name}</div>
                        <div class="app-id">${app.id}</div>
                    </div>
                    <button class="open-btn" onclick="openApp('${app.id}')">Open</button>
                    <button class="uninstall-btn" onclick="uninstallApp('${app.id}')">Uninstall</button>
                `;
                content.appendChild(card);
            });
        }

        function installApp(app) {
            setStatus('Installing ' + app.name + '...');
            alert('Installing: ' + app.id);
            console.log('INSTALL:' + app.id + ':' + app.name);
        }

        function openApp(id) {
            console.log('OPENAPP:' + id);
        }

        function uninstallApp(id) {
            if (!confirm('Uninstall this app?')) return;
            setStatus('Uninstalling...');
            console.log('UNINSTALL:' + id);
        }

        function setStatus(msg) {
            document.getElementById('status-bar').textContent = msg;
        }

        function loadInstalledApps(data) {
            installedApps = data || [];
            if (currentTab === 'myapps') renderMyApps();
        }

        function loadSearchResults(data) {
            searchResults = data || [];
            setStatus(searchResults.length + ' results found');
            renderResults(searchResults);
        }

        function installComplete(id) {
            setStatus('Installed successfully!');
            renderResults(searchResults);
            renderMyApps();
        }

        document.getElementById('search-btn').addEventListener('click', function() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            setStatus('Searching...');
            console.log('SEARCH:' + query);
        });

        document.getElementById('search-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('search-btn').click();
        });
    </script>
</body>
</html>
