<!DOCTYPE html>
<html>
<head>
    <title>Scribble Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0d0f;
            color: #e8e8f0;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #6c63ff;
            margin-bottom: 8px;
        }
        p.subtitle {
            font-size: 14px;
            color: #6b6b80;
            margin-bottom: 40px;
        }
        button {
            background-color: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover {
            background-color: #5a52d5;
        }
        #codes-container {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        #empty-message {
            color: #6b6b80;
            font-size: 14px;
            margin-top: 10px;
        }
        .code-card {
            background-color: #1a1a1f;
            border: 1px solid #2a2a35;
            border-radius: 10px;
            padding: 20px;
            width: 160px;
            height: 100px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .code-card:hover {
            border-color: #6c63ff;
            background-color: #1e1e28;
        }
        .card-name {
            font-size: 14px;
            color: #e8e8f0;
            text-align: center;
            margin-bottom: 8px;
        }
        .card-delete-btn {
            background-color: transparent;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }
        .card-delete-btn:hover {
            background-color: #f87171;
        }
    </style>
</head>
<body>
    <h1>Scribble Code</h1>
    <p class="subtitle">Your code files, saved localy</p>
    <button id="new-code-btn">+ New File</button>
    <div id="codes-container">
        <p id="empty-message">No files yet. Click + New File to create one!</p>
    </div>

    <script>
        let allCodes = [];

        const newCodeBtn = document.getElementById('new-code-btn');
        const codesContainer = document.getElementById('codes-container');
        const emptyMessage = document.getElementById('empty-message');

        function loadCodes(codes) {
            if (!codes || codes.length === 0) return;
            allCodes = codes;
            codes.forEach(function(code) {
                createCodeCard(code.title, code.id);
            });
        }

        newCodeBtn.addEventListener('click', function() {
            const name = prompt("Name your file:");
            if (!name) return;

            const code = {
                id: Date.now().toString(),
                title: name,
                content: ''
            };

            allCodes.push(code);
            console.log('SAVECODE:' + JSON.stringify(allCodes));
            createCodeCard(code.title, code.id);
        });

        function createCodeCard(name, id) {
            emptyMessage.style.display = 'none';

            const card = document.createElement('div');
            card.className = 'code-card';
            card.dataset.id = id;

            card.addEventListener('click', function() {
                window.location.href = 'code_editor.html?id=' + id + '&name=' + encodeURIComponent(name);
            });

            card.addEventListener('dblclick', function() {
                const newName = prompt("Rename file:", cardName.textContent);
                if (!newName) return;
                cardName.textContent = newName;
                allCodes.forEach(function(code) {
                    if (code.id === id) code.title = newName;
                });
                console.log('SAVECODE:' + JSON.stringify(allCodes));
            });

            const cardName = document.createElement('p');
            cardName.textContent = name;
            cardName.className = 'card-name';

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '🗑';
            deleteBtn.className = 'card-delete-btn';

            deleteBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (confirm("Delete " + name + "?")) {
                    card.remove();
                    allCodes = allCodes.filter(function(code) {
                        return code.id !== id;
                    });
                    console.log('SAVECODE:' + JSON.stringify(allCodes));
                    if (codesContainer.querySelectorAll('.code-card').length === 0) {
                        emptyMessage.style.display = 'block';
                    }
                }
            });

            card.appendChild(cardName);
            card.appendChild(deleteBtn);
            codesContainer.appendChild(card);
        }
    </script>
</body>
</html>
