<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyberpunk Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Rajdhani', sans-serif;
    }

    body {
      background: #0b0e14;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d1d5db;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 1100px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 60px;
      letter-spacing: 4px;
      color: #9ca3af;
    }

    .button-group {
      display: flex;
      gap: 40px;
      justify-content: center;
    }

    .btn {
      text-decoration: none;
      padding: 80px 100px;
      font-size: 2.2rem;
      border-radius: 8px;
      border: 1px solid #2a2f3a;
      color: #e5e7eb;
      background: linear-gradient(145deg, #11151c, #0a0d12);
      position: relative;
      transition: all 0.25s ease;
      min-width: 350px;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-align: center;
    }

    .btn::before,
    .btn::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid #3b82f6;
      opacity: 0.6;
    }

    .btn::before {
      top: -2px;
      left: -2px;
      border-right: none;
      border-bottom: none;
    }

    .btn::after {
      bottom: -2px;
      right: -2px;
      border-left: none;
      border-top: none;
    }

    .btn:hover {
      background: #151922;
      border-color: #3b82f6;
      transform: translateY(-4px);
    }

    .btn:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>SELECT MODE</h1>
    <div class="button-group">
      <a href="trial.html" class="btn">TRIAL</a>
      <a href="fight.html" class="btn">FIGHT</a>
    </div>
  </div>

</body>
</html>
