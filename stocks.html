<!DOCTYPE html>
<html>
<head>
    <title>Scribble Stocks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0d0d0f;
            color: #e8e8f0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #top-bar {
            background-color: #1a1a1f;
            border-bottom: 1px solid #2a2a35;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #title {
            color: #6c63ff;
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
        }
        #search-input {
            flex: 1;
            background-color: #1e1e28;
            color: #e8e8f0;
            border: 1.5px solid #2a2a35;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            outline: none;
        }
        #search-input:focus { border-color: #6c63ff; }
        #search-btn {
            background-color: #6c63ff;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 14px;
            cursor: pointer;
        }
        #search-btn:hover { background-color: #5a52d5; }
        #refresh-btn {
            background-color: #1e1e28;
            color: #a78bfa;
            border: 1px solid #2a2a35;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        #refresh-btn:hover { background-color: #2a2a35; }
        #content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        #watchlist-title {
            font-size: 13px;
            color: #6b6b80;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .stock-card {
            background-color: #1a1a1f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.2s;
        }
        .stock-card:hover { border-color: #3a3a55; }
        .stock-ticker {
            font-size: 18px;
            font-weight: 700;
            color: #a78bfa;
            width: 80px;
        }
        .stock-name {
            flex: 1;
            font-size: 13px;
            color: #6b6b80;
        }
        .stock-price {
            font-size: 20px;
            font-weight: 600;
            color: #e8e8f0;
            width: 100px;
            text-align: right;
        }
        .stock-change {
            font-size: 14px;
            font-weight: 600;
            width: 120px;
            text-align: right;
        }
        .stock-change.up { color: #4ade80; }
        .stock-change.down { color: #f87171; }
        .remove-btn {
            background-color: transparent;
            color: #3a3a55;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .remove-btn:hover { color: #f87171; background-color: #1e1e28; }
        #empty-msg {
            text-align: center;
            color: #3a3a55;
            font-size: 14px;
            margin-top: 60px;
        }
        #search-results {
            margin-bottom: 24px;
        }
        .search-result-card {
            background-color: #111115;
            border: 1px solid #2a2a35;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .search-result-card:hover {
            border-color: #6c63ff;
            background-color: #1a1a1f;
        }
        .result-ticker {
            font-size: 15px;
            font-weight: 700;
            color: #6c63ff;
            width: 80px;
        }
        .result-name {
            flex: 1;
            font-size: 13px;
            color: #6b6b80;
        }
        .add-btn {
            background-color: #6c63ff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }
        .add-btn:hover { background-color: #5a52d5; }
        #status-bar {
            background-color: #111115;
            border-top: 1px solid #2a2a35;
            padding: 6px 16px;
            font-size: 12px;
            color: #6b6b80;
            display: flex;
            justify-content: space-between;
        }
        .loading { color: #a78bfa; }
    </style>
</head>
<body>
    <div id="top-bar">
        <span id="title">📈 Stocks</span>
        <input type="text" id="search-input" placeholder="Search ticker or company (e.g. AAPL, Tesla)...">
        <button id="search-btn">Search</button>
        <button id="refresh-btn">↺ Refresh</button>
    </div>

    <div id="content">
        <div id="search-results"></div>
        <div id="watchlist-title">Watchlist</div>
        <div id="watchlist"></div>
        <div id="empty-msg">Search for a stock and add it to your watchlist</div>
    </div>

    <div id="status-bar">
        <span id="status">Ready</span>
        <span id="last-updated"></span>
    </div>

    <script>
        let watchlist = [];

        function setStatus(msg, cls) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = cls || '';
        }

        function renderWatchlist() {
            const el = document.getElementById('watchlist');
            const empty = document.getElementById('empty-msg');
            el.innerHTML = '';

            if (watchlist.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            watchlist.forEach(function(stock) {
                const card = document.createElement('div');
                card.className = 'stock-card';

                const ticker = document.createElement('div');
                ticker.className = 'stock-ticker';
                ticker.textContent = stock.ticker;

                const name = document.createElement('div');
                name.className = 'stock-name';
                name.textContent = stock.name || '';

                const price = document.createElement('div');
                price.className = 'stock-price';
                price.textContent = stock.price ? '$' + stock.price.toFixed(2) : '—';

                const change = document.createElement('div');
                const isUp = stock.change !== null && stock.change >= 0;
                change.className = 'stock-change ' + (isUp ? 'up' : 'down');

                change.textContent = (stock.change !== undefined && stock.change !== null)
                    ? (isUp ? '+' : '') + stock.change.toFixed(2) + ' (' + (isUp ? '+' : '') + stock.changePct.toFixed(2) + '%)'
                    : '—';

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.textContent = '✕';
                removeBtn.addEventListener('click', function() {
                    removeStock(stock.ticker);
                });

                card.appendChild(ticker);
                card.appendChild(name);
                card.appendChild(price);
                card.appendChild(change);
                card.appendChild(removeBtn);
                el.appendChild(card);
            });

            document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
        }

        function removeStock(ticker) {
            watchlist = watchlist.filter(function(s) { return s.ticker !== ticker; });
            saveWatchlist();
            renderWatchlist();
        }

        function saveWatchlist() {
            console.log('SAVEWATCHLIST:' + JSON.stringify(watchlist));
        }

        function loadWatchlist(data) {
            if (!data) return;
            watchlist = typeof data === 'string' ? JSON.parse(data) : data;
            renderWatchlist();
            if (watchlist.length > 0) refreshAll();
        }

        function refreshAll() {
            if (watchlist.length === 0) return;
            setStatus('Refreshing...', 'loading');
            const tickers = watchlist.map(function(s) { return s.ticker; }).join(',');
            console.log('FETCHSTOCKS:' + tickers);
        }

        function updateStockData(data) {
            if (!data) return;
            data.forEach(function(updated) {
                const stock = watchlist.find(function(s) { return s.ticker === updated.ticker; });
                if (stock) {
                    stock.price = updated.price;
                    stock.change = updated.change;
                    stock.changePct = updated.changePct;
                    stock.name = updated.name || stock.name;
                }
            });
            setStatus('Ready');
            renderWatchlist();
        }

        function showSearchResults(results) {
            const el = document.getElementById('search-results');
            el.innerHTML = '';
            if (!results || results.length === 0) {
                setStatus('No results found');
                return;
            }
            setStatus(results.length + ' results found');

            results.forEach(function(result) {
                const card = document.createElement('div');
                card.className = 'search-result-card';

                const ticker = document.createElement('div');
                ticker.className = 'result-ticker';
                ticker.textContent = result.ticker;

                const name = document.createElement('div');
                name.className = 'result-name';
                name.textContent = result.name;

                const addBtn = document.createElement('button');
                addBtn.className = 'add-btn';
                addBtn.textContent = '+ Add';
                addBtn.addEventListener('click', function() {
                    addToWatchlist(result);
                    el.innerHTML = '';
                });

                card.appendChild(ticker);
                card.appendChild(name);
                card.appendChild(addBtn);
                el.appendChild(card);
            });
        }

        function addToWatchlist(stock) {
            if (watchlist.find(function(s) { return s.ticker === stock.ticker; })) return;
            watchlist.push({ ticker: stock.ticker, name: stock.name, price: null, change: null, changePct: null });
            saveWatchlist();
            renderWatchlist();
            console.log('FETCHSTOCKS:' + stock.ticker);
        }

        document.getElementById('search-btn').addEventListener('click', function() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            setStatus('Searching...', 'loading');
            console.log('SEARCHSTOCK:' + query);
        });

        document.getElementById('search-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('search-btn').click();
        });

        document.getElementById('refresh-btn').addEventListener('click', refreshAll);
    </script>
</body>
</html>
